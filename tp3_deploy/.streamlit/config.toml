[theme]
primaryColor        = "#3498db"
backgroundColor     = "#ffffff"
secondaryBackgroundColor = "#f5f7fa"
textColor           = "#1a1a1a"
font                = "sans serif"

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = true
maxUploadSize       = 10

[browser]
gatherUsageStats    = false

[runner]
magicEnabled        = false
